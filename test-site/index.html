<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solid Extension Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      color: #1a1a2e;
    }
    h1 { color: #7C4DFF; }
    .card {
      background: #f5f0ff;
      border: 1px solid #B388FF;
      border-radius: 8px;
      padding: 16px;
      margin: 16px 0;
    }
    .label {
      font-size: 12px;
      text-transform: uppercase;
      color: #555;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    #webid, #fetch-result {
      word-break: break-all;
      white-space: pre-wrap;
    }
    .error { color: #d32f2f; }
    .waiting { color: #888; font-style: italic; }
  </style>
</head>
<body>
  <h1>Solid Extension Test</h1>

  <div class="card">
    <div class="label">WebID</div>
    <div id="webid" class="waiting">Waiting for Solid extension...</div>
  </div>

  <div class="card">
    <div class="label">Authenticated Fetch Result</div>
    <div id="fetch-result" class="waiting">Waiting for authentication...</div>
  </div>

  <div class="card">
    <div class="label">Status</div>
    <div id="status">Checking for Solid extension...</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
