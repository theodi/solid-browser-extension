# Extra review instructions added to prompts for this repo.
review_guidelines = '''
Chrome browser extension (Manifest V3) providing Solid authentication.

Focus on:
- Security: OAuth/OIDC flows, token handling, DPoP proofs, message passing between MAIN world, ISOLATED world, and service worker
- Chrome extension best practices: service worker suspension/wake-up, chrome.storage, chrome.identity
- Solid protocol compliance: WebID resolution, client identifiers, solid:oidcIssuer validation
- Message serialization: data over chrome.runtime and window.postMessage must be JSON-serializable

Do not flag:
- Extractable DPoP keys (required because service workers suspend)
- CLIENT_ID constant pointing to localhost (test/dev configuration)
'''
